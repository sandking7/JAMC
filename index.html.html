<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JPS-100 제조 SOP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --border2: #3d4266;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --success: #34c77b;
    --success-dim: rgba(52,199,123,0.12);
    --warning: #f5a623;
    --warning-dim: rgba(245,166,35,0.10);
    --danger: #f25f5c;
    --text1: #e8eaf2;
    --text2: #8b90ad;
    --text3: #555a78;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    padding: 16px;
  }

  /* ── 헤더 ── */
  .app-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-header-left .title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .app-header-left .subtitle {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
    font-family: var(--mono);
  }
  .date-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 6px;
    padding: 5px 10px;
  }

  /* ── 진행률 ── */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    margin-bottom: 14px;
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 12px; color: var(--text2); }
  .progress-count { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── 섹션 ── */
  .section { margin-bottom: 14px; }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  /* ── 카드 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
  }

  /* ── 투입량 계산 ── */
  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 5px;
  }
  .input-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 16px;
    font-family: var(--mono);
    color: var(--text1);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .result-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .result-item.highlight {
    background: var(--accent-dim);
    border-color: rgba(79,142,247,0.3);
  }
  .result-item .r-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .result-item.highlight .r-label { color: var(--accent); }
  .result-item .r-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text1);
  }
  .result-item.highlight .r-val { color: var(--accent); }
  .result-item .r-unit {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── 스텝 카드 ── */
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.25s;
  }
  .step-card.active { border-color: var(--accent); }
  .step-card.done { border-color: var(--success); background: rgba(52,199,123,0.04); }
  .step-card.locked { opacity: 0.45; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; font-family: var(--mono);
    flex-shrink: 0;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
    transition: all 0.2s;
  }
  .step-card.active .step-num {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
  .step-card.done .step-num {
    background: var(--success-dim);
    color: var(--success);
    border-color: var(--success);
  }
  .step-title { font-size: 14px; font-weight: 500; flex: 1; }
  .step-card.done .step-title { color: var(--success); }
  .step-spec {
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
    margin-top: 2px;
  }

  .step-body {
    padding: 0 16px 14px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .step-card.active .step-body { display: flex; }

  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .field-label { font-size: 11px; color: var(--text2); }
  .field-row { display: flex; align-items: center; gap: 8px; }
  .field-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 15px;
    font-family: var(--mono);
    color: var(--text1);
    outline: none;
    min-width: 0;
    transition: border-color 0.2s;
  }
  .field-row input:focus { border-color: var(--accent); }
  .field-row input[type="time"] { font-size: 14px; }
  .field-unit { font-size: 12px; color: var(--text3); flex-shrink: 0; }

  .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .time-grid input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text1);
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .time-grid input:focus { border-color: var(--accent); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  /* 계산된 실투입량 표시 */
  .actual-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .actual-label { color: var(--text2); }
  .actual-val { font-family: var(--mono); color: var(--warning); font-weight: 500; }

  /* 완료 버튼 */
  .btn-complete {
    width: 100%;
    padding: 11px;
    background: var(--accent-dim);
    border: 1px solid rgba(79,142,247,0.4);
    border-radius: 10px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 2px;
  }
  .btn-complete:hover { background: rgba(79,142,247,0.22); }
  .btn-complete:active { transform: scale(0.98); }

  /* 최종 체크 */
  .final-check {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .final-check.checked {
    border-color: var(--success);
    background: rgba(52,199,123,0.04);
  }
  .check-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .final-check.checked .check-box {
    background: var(--success);
    border-color: var(--success);
  }
  .check-box svg { display: none; }
  .final-check.checked .check-box svg { display: block; }
  .final-check-label { font-size: 13px; color: var(--text1); flex: 1; line-height: 1.5; }
  .final-check.checked .final-check-label { color: var(--success); }

  /* 제출 버튼 */
  .btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--success-dim);
    border: 1px solid rgba(52,199,123,0.4);
    border-radius: 12px;
    color: var(--success);
    font-size: 15px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
    letter-spacing: -0.2px;
  }
  .btn-submit:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .btn-submit:not(:disabled):hover { background: rgba(52,199,123,0.22); }
  .btn-submit:not(:disabled):active { transform: scale(0.99); }

  /* 완료 화면 */
  .done-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: var(--surface);
    border: 1px solid var(--success);
    border-radius: 14px;
    margin-top: 14px;
  }
  .done-screen .done-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .done-screen .done-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--success);
    margin-bottom: 8px;
  }
  .done-screen .done-sub {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* 로딩 */
  .submitting {
    display: none;
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: var(--text2);
    font-family: var(--mono);
  }

  /* 배치번호 입력 */
  .batch-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 4px;
  }
  .batch-input-wrap label { font-size: 11px; color: var(--text2); }
  .batch-input-wrap input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 15px;
    font-family: var(--mono);
    color: var(--text1);
    outline: none;
    transition: border-color 0.2s;
  }
  .batch-input-wrap input:focus { border-color: var(--accent); }

  /* 서명 입력 */
  .sign-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .sign-label { font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .sign-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border2);
    padding: 4px 0;
    font-size: 14px;
    color: var(--text1);
    font-family: var(--sans);
    outline: none;
  }

  .worker-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .worker-wrap label { font-size: 11px; color: var(--text2); }
  .worker-wrap input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: var(--sans);
    color: var(--text1);
    outline: none;
    transition: border-color 0.2s;
  }
  .worker-wrap input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<div id="main-app" style="max-width:480px; margin:0 auto;">

  <!-- 헤더 -->
  <div class="app-header">
    <div class="app-header-left">
      <div class="title">JPS-100 제조 SOP</div>
      <div class="subtitle" id="today-str">로딩 중...</div>
    </div>
    <div class="date-badge" id="date-badge">—</div>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">전체 진행률</span>
      <span class="progress-count" id="prog-count">0 / 7</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-fill"></div>
    </div>
  </div>

  <!-- STEP 0: 작업자 + 배치번호 -->
  <div class="section">
    <div class="section-label">작업자 정보</div>
    <div class="card">
      <div class="worker-wrap">
        <label>작업자 이름</label>
        <input type="text" id="worker-name" placeholder="이름 입력">
      </div>
      <div class="worker-wrap" style="margin-bottom:0">
        <label>배치번호 (Batch No.)</label>
        <input type="text" id="batch-no" placeholder="예: 2025-001">
      </div>
    </div>
  </div>

  <!-- STEP 1: 제조량 계산 -->
  <div class="section">
    <div class="section-label">① 제조량 계획 및 자동 계산</div>
    <div class="card">
      <div class="input-grid">
        <div class="input-group">
          <label>현재 탱크 잔량 (L)</label>
          <input type="number" id="cur-level" placeholder="예: 400" oninput="calc()">
        </div>
        <div class="input-group">
          <label>목표 탱크 레벨 (L)</label>
          <input type="number" id="tgt-level" placeholder="예: 9000" oninput="calc()">
        </div>
      </div>
      <div class="result-grid" id="results" style="display:none">
        <div class="result-item highlight">
          <div class="r-label">실제 제조량 ③</div>
          <div class="r-val" id="r-prod">—</div>
          <div class="r-unit">리터</div>
        </div>
        <div class="result-item highlight">
          <div class="r-label">용해수 1차 충진 목표</div>
          <div class="r-val" id="r-water">—</div>
          <div class="r-unit">L 눈금까지</div>
        </div>
        <div class="result-item">
          <div class="r-label">SD-030</div>
          <div class="r-val" id="r-sd">—</div>
          <div class="r-unit">리터</div>
        </div>
        <div class="result-item">
          <div class="r-label">BP95 목표</div>
          <div class="r-val" id="r-bp">—</div>
          <div class="r-unit">kg</div>
        </div>
        <div class="result-item">
          <div class="r-label">MSP 목표</div>
          <div class="r-val" id="r-msp">—</div>
          <div class="r-unit">kg</div>
        </div>
        <div class="result-item">
          <div class="r-label">효소제 목표</div>
          <div class="r-val" id="r-enz">—</div>
          <div class="r-unit">kg</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 체크리스트 -->
  <div class="section">
    <div class="section-label">② 제조 순서 체크리스트</div>
    <div id="steps-wrap"></div>
  </div>

  <!-- STEP 3: 마무리 -->
  <div class="section">
    <div class="section-label">③ 마무리 세척 확인</div>
    <div class="final-check" id="fc1" onclick="toggleFinal('fc1')">
      <div class="check-box">
        <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="final-check-label">제조탱크 메쉬필터 탈거 후 물세척 완료</div>
    </div>
    <div class="final-check" id="fc2" onclick="toggleFinal('fc2')">
      <div class="check-box">
        <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="final-check-label">저장탱크 메쉬필터 탈거 후 물세척 완료</div>
    </div>
  </div>

  <!-- 제출 -->
  <div class="submitting" id="submitting-msg">구글시트에 전송 중...</div>
  <button class="btn-submit" id="submit-btn" disabled onclick="submitAll()">
    ✓ 제조 완료 — 구글시트 제출
  </button>

  <!-- 완료 화면 -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">✅</div>
    <div class="done-title">제출 완료</div>
    <div class="done-sub" id="done-msg"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// ▶ 구글시트 연동 설정
// Google Apps Script 배포 후 아래 URL을 교체하세요
// ══════════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzVjtuUVESAQzwwt46EXVl_bxK5M0JO0waxoz2FcLOPrE0ZybMIFaLRBuIEMqkRV8xJjw/exec";

// ══════════════════════════════════════════════
// 날짜
// ══════════════════════════════════════════════
const now = new Date();
const yy = now.getFullYear();
const mm = String(now.getMonth()+1).padStart(2,'0');
const dd = String(now.getDate()).padStart(2,'0');
const dateStr = `${yy}-${mm}-${dd}`;
const dateKor = `${yy}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
document.getElementById('today-str').textContent = dateKor + ' 제조';
document.getElementById('date-badge').textContent = dateStr;

// ══════════════════════════════════════════════
// 계산 데이터
// ══════════════════════════════════════════════
let C = {}; // 계산 결과 저장
let stepDone = [false,false,false,false,false,false,false];
let finalDone = {fc1:false, fc2:false};

function calc() {
  const cur = parseFloat(document.getElementById('cur-level').value);
  const tgt = parseFloat(document.getElementById('tgt-level').value);
  if (isNaN(cur)||isNaN(tgt)||tgt<=cur) {
    document.getElementById('results').style.display='none';
    return;
  }
  const prod = tgt - cur;
  C = {
    cur, tgt, prod,
    water: parseFloat((cur + prod * 0.98).toFixed(1)),
    sd030: parseFloat((prod * 0.0001).toFixed(2)),
    bp95:  parseFloat((prod * 0.0005).toFixed(2)),
    msp:   parseFloat((prod * 0.002).toFixed(2)),
    enz:   parseFloat((prod * 0.0203).toFixed(1))
  };
  document.getElementById('r-prod').textContent  = prod.toFixed(0);
  document.getElementById('r-water').textContent = C.water.toFixed(0);
  document.getElementById('r-sd').textContent    = C.sd030.toFixed(2);
  document.getElementById('r-bp').textContent    = C.bp95.toFixed(2);
  document.getElementById('r-msp').textContent   = C.msp.toFixed(2);
  document.getElementById('r-enz').textContent   = C.enz.toFixed(1);
  document.getElementById('results').style.display='grid';
  renderSteps();
}

// ══════════════════════════════════════════════
// 스텝 정의
// ══════════════════════════════════════════════
function getSteps() {
  return [
    {
      id:'s0', label:'1차 용해수 투입',
      spec: `탱크 ${C.water ? C.water.toFixed(0) : '—'} L 눈금까지 충진`,
      fields:[{key:'s0_water', label:'실제 충진 레벨', unit:'L', type:'number'}],
      time:true, timeLabel:'충진 시작 / 종료'
    },
    {
      id:'s1', label:'SD-030 투입 (충진 중)',

      },

    {

      spec: `목표: ${C.enz ? C.enz.toFixed(1) : '—'} kg`,
      fields:[
        {key:'s4_before', label:'투입 전 로드셀', unit:'kg', type:'number'},
        {key:'s4_after',  label:'투입 후 로드셀', unit:'kg', type:'number'}
      ],
      actualFn: ()=>{

        const a=parseFloat(document.getElementById('s4_after')?.value||0);

      },

      fields:[{key:'s5_final', label:'최종 탱크 레벨', unit:'L', type:'number'}],
      time:true, timeLabel:'보충 시작 / 종료'
    },
    {
      id:'s6', label:'QC 샘플 채취 및 저장탱크 이송',
      spec:'메쉬필터 경유 이송',
      fields:[{key:'s6_note', label:'특이사항 (없으면 "없음")', unit:'', type:'text'}],
      time:true, timeLabel:'이송 시작 / 종료'
    }
  ];
}

function renderSteps() {
  const wrap = document.getElementById('steps-wrap');
  wrap.innerHTML = '';
  const steps = getSteps();
  steps.forEach((step, i) => {
    const done = stepDone[i];
    const isActive = !done && (i === 0 || stepDone[i-1]);
    const locked = !done && !isActive;

    const div = document.createElement('div');
    div.className = 'step-card' + (done?' done':isActive?' active':locked?' locked':'');
    div.id = 'step-card-'+i;

    let bodyHtml = `<div class="step-body" id="step-body-${i}">`;

    step.fields.forEach(f => {
      bodyHtml += `<div class="field-wrap">
        <div class="field-label">${f.label}</div>
        <div class="field-row">
          <input type="${f.type}" id="${f.key}" placeholder="입력">
          ${f.unit ? `<span class="field-unit">${f.unit}</span>` : ''}
        </div>
      </div>`;
    });

    if (step.actualFn) {
      bodyHtml += `<div class="actual-row" id="actual-${i}">
        <span class="actual-label">${step.actualLabel}</span>
        <span class="actual-val" id="actual-val-${i}">— ${step.actualUnit}</span>
      </div>`;
    }

    if (step.time) {
      bodyHtml += `<div class="field-wrap">
        <div class="field-label">${step.timeLabel}</div>
        <div class="time-grid">
          <input type="time" id="t-${i}-s">
          <input type="time" id="t-${i}-e">
        </div>
      </div>`;
    }

    bodyHtml += `<div class="sign-wrap">
      <span class="sign-label">서명</span>
      <input class="sign-input" type="text" id="sign-${i}" placeholder="이름 입력">
    </div>`;

    bodyHtml += `<button class="btn-complete" onclick="completeStep(${i})">✓ 완료 확인</button>`;
    bodyHtml += `</div>`;

    div.innerHTML = `
      <div class="step-header">
        <div class="step-num">${done ? '✓' : (i+1)}</div>
        <div>
          <div class="step-title">${step.label}</div>
          <div class="step-spec">${step.spec}</div>
        </div>
      </div>
      ${bodyHtml}
    `;

    wrap.appendChild(div);

    if (step.actualFn && isActive) {
      ['s2_before','s2_after','s3_before','s3_after','s4_before','s4_after'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', () => {
          const steps2 = getSteps();
          steps2.forEach((s2,j) => {
            if (s2.actualFn) {
              const v = s2.actualFn();
              const el2 = document.getElementById(`actual-val-${j}`);
              if (el2) el2.textContent = v ? `${v} ${s2.actualUnit}` : `— ${s2.actualUnit}`;
            }
          });
        });
      });
    }
  });

  updateProgress();
}

function completeStep(i) {
  stepDone[i] = true;
  renderSteps();
  updateProgress();
  // 다음 스텝으로 스크롤
  setTimeout(() => {
    const next = document.getElementById(`step-card-${i+1}`);
    if (next) next.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function toggleFinal(id) {
  finalDone[id] = !finalDone[id];
  document.getElementById(id).classList.toggle('checked', finalDone[id]);
  updateProgress();
}

function updateProgress() {
  const done = stepDone.filter(Boolean).length;
  const total = 7;
  document.getElementById('prog-count').textContent = `${done} / ${total}`;
  document.getElementById('prog-fill').style.width = (done/total*100) + '%';

  const allSteps = stepDone.slice(0,7).every(Boolean);
  const allFinal = finalDone.fc1 && finalDone.fc2;
  const hasWorker = document.getElementById('worker-name')?.value.trim();
  const hasBatch = document.getElementById('batch-no')?.value.trim();
  document.getElementById('submit-btn').disabled = !(allSteps && allFinal && hasWorker && hasBatch);
}

// 작업자/배치 입력 감지
document.getElementById('worker-name').addEventListener('input', updateProgress);
document.getElementById('batch-no').addEventListener('input', updateProgress);

// ══════════════════════════════════════════════
// 구글시트 제출
// ══════════════════════════════════════════════
function collectData() {
  const steps = getSteps();
  const row = {
    date: dateStr,
    worker: document.getElementById('worker-name').value.trim(),
    batchNo: document.getElementById('batch-no').value.trim(),
    curLevel: document.getElementById('cur-level').value,
    tgtLevel: document.getElementById('tgt-level').value,
    prodVol: C.prod?.toFixed(0),
    waterTarget: C.water?.toFixed(0),
    sd030Target: C.sd030?.toFixed(2),
    bp95Target: C.bp95?.toFixed(2),
    mspTarget: C.msp?.toFixed(2),
    enzTarget: C.enz?.toFixed(1),
  };

  steps.forEach((s, i) => {
    s.fields.forEach(f => {
      row[f.key] = document.getElementById(f.key)?.value || '';
    });
    if (s.actualFn) row[`actual_${i}`] = s.actualFn() || '';
    if (s.time) {
      row[`t${i}_s`] = document.getElementById(`t-${i}-s`)?.value || '';
      row[`t${i}_e`] = document.getElementById(`t-${i}-e`)?.value || '';
    }
    row[`sign_${i}`] = document.getElementById(`sign-${i}`)?.value || '';
  });

  row.fc1 = finalDone.fc1 ? 'Y' : 'N';
  row.fc2 = finalDone.fc2 ? 'Y' : 'N';
  return row;
}

async function submitAll() {
  const data = collectData();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submitting-msg').style.display = 'block';

  if (SHEET_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
    // 개발 모드: 실제 URL 미설정 시 데이터 출력
    setTimeout(() => {
      document.getElementById('submitting-msg').style.display = 'none';
      document.getElementById('done-screen').style.display = 'block';
      document.getElementById('done-msg').innerHTML =
        `배치번호: <b>${data.batchNo}</b><br>작업자: ${data.worker}<br>제조량: ${data.prodVol} L<br><br>⚙️ 실제 배포 시 Google Apps Script URL을 설정하면 자동으로 시트에 기록됩니다.`;
      document.getElementById('done-screen').scrollIntoView({behavior:'smooth'});
    }, 1200);
    return;
  }

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    document.getElementById('submitting-msg').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    document.getElementById('done-msg').innerHTML =
      `배치번호: <b>${data.batchNo}</b><br>작업자: ${data.worker}<br>제조량: ${data.prodVol} L<br><br>구글시트에 기록 완료되었습니다.`;
    document.getElementById('done-screen').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('submitting-msg').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    alert('전송 실패: 네트워크를 확인하세요.\n' + e.message);
  }
}

// 초기 렌더
renderSteps();
</script>
